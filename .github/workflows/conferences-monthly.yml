name: Conference Deadlines Monthly

on:
  schedule:
    # 每月最后一个周日 UTC 07:30（脚本内校验 is_last_sunday）
    - cron: '30 7 * * 0'
  workflow_dispatch:
    inputs:
      force:
        description: 'Run even if not last Sunday'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  conferences-monthly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Generate conference deadline digest
        env:
          API_KEY: ${{ secrets.API_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
          MODEL: ${{ secrets.MODEL }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: |
          pip install -r requirements.txt
          FORCE_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python main.py --task conferences-monthly --send_email $FORCE_FLAG \
            --api_key "${API_KEY}" \
            --base_url "${BASE_URL:-https://api.deepseek.com}" \
            --model "${MODEL:-deepseek-v4-flash}" | tee digest.log
          if [ "${{ github.event_name }}" = "schedule" ]; then
            grep -q "Email sent to" digest.log || grep -q "RESULT: skipped_not_last_sunday" digest.log || {
              echo "::error::Scheduled conference digest did not send email."
              exit 1
            }
          fi
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/conferences/
          git diff --staged --quiet || git commit -m "Update conference deadline digest"
          git pull --rebase origin main
          git push
