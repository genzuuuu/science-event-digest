name: PKS Weekly Digest

on:
  schedule:
    # 每周日 UTC 07:00（欧洲中部时间约 08:00–09:00）
    - cron: '0 7 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pks-weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Generate PKS weekly digest
        env:
          API_KEY: ${{ secrets.API_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
          MODEL: ${{ secrets.MODEL }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: |
        pip install -r requirements.txt
        python main.py --task pks-weekly --send_email \
          --api_key "${API_KEY}" \
          --base_url "${BASE_URL:-https://api.deepseek.com}" \
          --model "${MODEL:-deepseek-v4-flash}"
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/pks/
          git diff --staged --quiet || git commit -m "Update PKS weekly digest"
          git push
